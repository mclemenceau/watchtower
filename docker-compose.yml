services:

  # ── Temporal dev server ───────────────────────────────────────────────────
  temporal:
    image: temporalio/temporal-cli:latest
    command: server start-dev --ip 0.0.0.0 --port 7233 --ui-port 8233
    ports:
      - "7233:7233"   # gRPC (worker + server connect here)
      - "8233:8233"   # Temporal Web UI
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Temporal worker ───────────────────────────────────────────────────────
  worker:
    build:
      context: .
      args:
        TARGET: worker
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
      SERVER_URL: http://server:8080
    volumes:
      - state:/app/state
    depends_on:
      temporal:
        condition: service_healthy
    restart: on-failure

  # ── HTTP gateway + SSE feed ───────────────────────────────────────────────
  server:
    build:
      context: .
      args:
        TARGET: server
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
      PORT: "8080"
    ports:
      - "8080:8080"   # Web UI + /query + /feed
    depends_on:
      temporal:
        condition: service_healthy
    restart: on-failure

volumes:
  state:
