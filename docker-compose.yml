services:

  # ── PostgreSQL (Temporal backend) ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Temporal dev server ───────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgres
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - BIND_ON_IP=0.0.0.0
    ports:
      - "7233:7233"   # gRPC (bot connects here)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '>/dev/tcp/127.0.0.1/7233' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── Temporal Web UI ───────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8233:8080"   # Temporal Web UI
    depends_on:
      temporal:
        condition: service_healthy

  # ── Watchtower bot (Temporal worker + Mattermost REPL) ───────────────────
  bot:
    build:
      context: .
      args:
        TARGET: bot
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
    volumes:
      - state:/app/state
    depends_on:
      temporal:
        condition: service_healthy
    restart: on-failure
    stdin_open: true   # keeps stdin open so the REPL can read input
    tty: true          # allocate a pseudo-TTY for the interactive REPL

volumes:
  state:
  postgres:
