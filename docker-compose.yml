services:

  # ── PostgreSQL (Temporal backend) ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Temporal dev server ───────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgres
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - BIND_ON_IP=0.0.0.0
    ports:
      - "7233:7233"   # gRPC (worker + server connect here)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '>/dev/tcp/127.0.0.1/7233' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── Temporal Web UI ───────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8233:8080"   # Temporal Web UI
    depends_on:
      temporal:
        condition: service_healthy

  # ── Temporal worker ───────────────────────────────────────────────────────
  worker:
    build:
      context: .
      args:
        TARGET: worker
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
      SERVER_URL: http://server:8080
    volumes:
      - state:/app/state
    depends_on:
      temporal:
        condition: service_healthy
    restart: on-failure

  # ── HTTP gateway + SSE feed ───────────────────────────────────────────────
  server:
    build:
      context: .
      args:
        TARGET: server
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
      PORT: "8080"
    ports:
      - "8080:8080"   # Web UI + /query + /feed
    depends_on:
      temporal:
        condition: service_healthy
    restart: on-failure

volumes:
  state:
  postgres:
