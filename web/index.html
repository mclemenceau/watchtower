<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARGUS — Release Monitor</title>
  <link rel="stylesheet" href="https://assets.ubuntu.com/v1/vanilla_framework_version_4.51.0.min.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Chat panel ── */
    .argus-workspace {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .argus-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    .argus-panel__header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.5rem;
      background: #f5f5f5;
      border-bottom: 1px solid #d9d9d9;
      flex-shrink: 0;
    }

    .argus-panel__title {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      margin: 0;
    }

    .argus-panel__body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
    }

    .argus-panel__footer {
      flex-shrink: 0;
      padding: 0.75rem 1.5rem;
      border-top: 1px solid #d9d9d9;
    }

    /* ── Connection status dot ── */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot--ok   { background: #0e8420; }
    .status-dot--err  { background: #c7162b; }
    .status-dot--wait { background: #f99b11; }

    /* ── Chat rows ── */
    .chat-row {
      display: flex;
      margin-bottom: 0.75rem;
    }

    .chat-row--user  { justify-content: flex-end; }
    .chat-row--agent { justify-content: flex-start; }

    .chat-bubble--user {
      max-width: 75%;
      padding: 0.5rem 0.875rem;
      font-size: 0.875rem;
      line-height: 1.5;
      background: #e95420;
      color: #fff;
      border-radius: 1rem 1rem 0.25rem 1rem;
    }

    .chat-reply { max-width: 90%; }

    /* ── Sender label ── */
    .argus-sender {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
    }

    /* ── Thinking indicator ── */
    .chat-thinking {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #666;
      padding: 0.5rem 0;
    }

    /* ── Feed messages in chat ── */
    .feed-msg-body {
      font-family: "Ubuntu Mono", "Courier New", monospace;
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f5f5f5;
      border-left: 3px solid #e95420;
      padding: 0.625rem 0.875rem;
      margin: 0;
    }

    .feed-msg--change .feed-msg-body { border-left-color: #c7162b; }

    /* ── Query form ── */
    .argus-form {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .argus-form input[type="text"] {
      flex: 1;
      margin-bottom: 0 !important;
    }

    .argus-form .p-button--positive {
      margin-bottom: 0 !important;
      white-space: nowrap;
    }

    /* ── Log excerpts in reply ── */
    .log-excerpts { margin-top: 0.75rem; }

    .log-excerpts summary {
      font-size: 0.8125rem;
      color: #666;
      cursor: pointer;
      margin-bottom: 0.5rem;
    }

    .log-excerpts pre {
      font-family: "Ubuntu Mono", "Courier New", monospace;
      font-size: 0.75rem;
      background: #2b2b2b;
      color: #f0f0f0;
      padding: 0.75rem;
      border-radius: 2px;
      overflow: auto;
      max-height: 200px;
      margin: 0;
    }

    /* ── Category badge ── */
    .category-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      font-size: 0.6875rem;
      font-weight: 600;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #fff;
    }

    /* ── Suggestion chips ── */
    .argus-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.875rem;
    }

    .argus-chip {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      font-size: 0.8125rem;
      border: 1px solid #d9d9d9;
      border-radius: 1rem;
      background: #fff;
      cursor: pointer;
      color: #333;
      transition: background 0.1s, border-color 0.1s;
    }

    .argus-chip:hover {
      background: #f5f5f5;
      border-color: #e95420;
      color: #e95420;
    }

    /* ── Top navigation ── */
    .argus-nav {
      display: flex;
      align-items: stretch;
      background: #1d1d1d;
      height: 3.25rem;
      flex-shrink: 0;
    }

    .argus-nav__logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .argus-nav__logo-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 3.25rem;
      height: 3.25rem;
      background: #e95420;
      flex-shrink: 0;
    }

    .argus-nav__wordmark {
      font-size: 1.125rem;
      font-weight: 300;
      color: #fff;
      padding: 0 1.25rem 0 0.875rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .argus-nav__subtitle {
      display: flex;
      align-items: center;
      margin-left: auto;
      padding: 0 1.5rem;
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- ── Navigation ── -->
<header class="argus-nav">
  <a href="/" class="argus-nav__logo">
    <div class="argus-nav__logo-badge">
      <!-- Ubuntu Circle of Friends (simplified) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <g fill="white">
          <circle cx="12" cy="4.5" r="2.2"/>
          <path d="M9.6 6.8 C7.4 9.2 7.4 13.2 9.6 15.3 L12 12.2 L14.4 15.3 C16.6 13.2 16.6 9.2 14.4 6.8 C13.3 8.6 10.7 8.6 9.6 6.8Z"/>
          <g transform="rotate(120,12,12)">
            <circle cx="12" cy="4.5" r="2.2"/>
            <path d="M9.6 6.8 C7.4 9.2 7.4 13.2 9.6 15.3 L12 12.2 L14.4 15.3 C16.6 13.2 16.6 9.2 14.4 6.8 C13.3 8.6 10.7 8.6 9.6 6.8Z"/>
          </g>
          <g transform="rotate(240,12,12)">
            <circle cx="12" cy="4.5" r="2.2"/>
            <path d="M9.6 6.8 C7.4 9.2 7.4 13.2 9.6 15.3 L12 12.2 L14.4 15.3 C16.6 13.2 16.6 9.2 14.4 6.8 C13.3 8.6 10.7 8.6 9.6 6.8Z"/>
          </g>
        </g>
      </svg>
    </div>
    <span class="argus-nav__wordmark">Argus</span>
  </a>
  <span class="argus-nav__subtitle">Agent Release Graduate for Ubuntu Systems</span>
</header>

<!-- ── Chat workspace ── -->
<div class="argus-workspace">
  <div class="argus-panel">
    <div class="argus-panel__header">
      <span class="status-dot status-dot--wait" id="feed-dot" title="Pipeline feed connection"></span>
      <span class="argus-panel__title">ARGUS</span>
      <span id="feed-status" style="font-size:0.75rem;color:#999;margin-left:auto;visibility:hidden;">Connecting…</span>
    </div>
    <div class="argus-panel__body" id="chat-body">
    </div>
    <div class="argus-panel__footer">
      <div class="argus-form">
        <input type="text" id="query-input"
               placeholder="e.g. what is the status of ubuntu-desktop-amd64?"
               autocomplete="off">
        <button class="p-button--positive" id="send-btn">Ask</button>
      </div>
    </div>
  </div>
</div>

<script>
  'use strict';

  const feedDot    = document.getElementById('feed-dot');
  const feedStatus = document.getElementById('feed-status');
  const chatBody   = document.getElementById('chat-body');
  const queryInput = document.getElementById('query-input');
  const sendBtn    = document.getElementById('send-btn');

  // ── Utilities ────────────────────────────────────────────────────────────

  function esc(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function ts() {
    return new Date().toLocaleTimeString([], {
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  }

  function scrollEnd(el) { el.scrollTop = el.scrollHeight; }

  // ── Greeting ─────────────────────────────────────────────────────────────

  const SUGGESTIONS = [
    'What is the current status of all releases?',
    'Are there any active failures right now?',
    'Why did ubuntu-server-amd64 fail?',
    'What changed in the last cycle?',
  ];

  function renderGreeting() {
    const chips = SUGGESTIONS.map(s =>
      `<button class="argus-chip" type="button">${esc(s)}</button>`
    ).join('');

    const el = document.createElement('div');
    el.className = 'chat-row chat-row--agent';
    el.innerHTML =
      `<div class="chat-reply">` +
        `<div class="argus-sender">Argus</div>` +
        `<div class="p-card" style="margin:0;">` +
          `<div style="padding:1rem;">` +
            `<p style="margin:0 0 0.5rem;font-weight:600;">Hi! I'm Argus.</p>` +
            `<p style="margin:0 0 0.75rem;color:#333;font-size:0.875rem;">` +
              `I monitor Ubuntu image build pipelines across all active releases. ` +
              `I'll post pipeline updates here as they happen, and you can ask me anything about build status or failures.` +
            `</p>` +
            `<p style="margin:0 0 0.25rem;font-size:0.8125rem;color:#666;">Here are a few things you can ask:</p>` +
            `<div class="argus-suggestions">${chips}</div>` +
          `</div>` +
        `</div>` +
      `</div>`;

    chatBody.appendChild(el);

    el.querySelectorAll('.argus-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        queryInput.value = btn.textContent;
        queryInput.focus();
      });
    });
  }

  // ── SSE Feed ─────────────────────────────────────────────────────────────

  const FEED_STATES = {
    ok:   ['status-dot--ok',   'Live'],
    err:  ['status-dot--err',  'Reconnecting…'],
    wait: ['status-dot--wait', 'Connecting…'],
  };

  function setFeedState(state) {
    const [cls, label] = FEED_STATES[state] || FEED_STATES.wait;
    feedDot.className      = 'status-dot ' + cls;
    feedStatus.textContent = label;
    feedStatus.style.visibility = 'visible';
  }

  function renderFeedMsg(text) {
    const isChange = /=== Change Report/.test(text);
    const el = document.createElement('div');
    el.className = 'chat-row chat-row--agent';
    el.innerHTML =
      `<div class="chat-reply${isChange ? ' feed-msg--change' : ''}">` +
        `<div class="argus-sender">Argus <span style="font-weight:400;color:#999;text-transform:none;letter-spacing:0;">${ts()}</span></div>` +
        `<pre class="feed-msg-body">${esc(text)}</pre>` +
      `</div>`;
    chatBody.appendChild(el);
    scrollEnd(chatBody);
  }

  (function connectSSE() {
    const es = new EventSource('/feed');
    es.addEventListener('open',    ()  => setFeedState('ok'));
    es.addEventListener('message', (e) => { setFeedState('ok'); renderFeedMsg(e.data); });
    es.addEventListener('error',   ()  => {
      setFeedState('err');
      es.close();
      setTimeout(connectSSE, 3000);
    });
  })();

  // ── Chat ─────────────────────────────────────────────────────────────────

  const CATEGORY_COLOR = {
    infra:      '#e95420',
    code:       '#c7162b',
    dependency: '#f99b11',
    flaky:      '#f99b11',
    unknown:    '#888888',
  };

  function appendUserMsg(text) {

    const el = document.createElement('div');
    el.className = 'chat-row chat-row--user';
    el.innerHTML = `<div class="chat-bubble--user">${esc(text)}</div>`;
    chatBody.appendChild(el);
    scrollEnd(chatBody);
  }

  function showThinking() {

    const el = document.createElement('div');
    el.className = 'chat-row chat-row--agent';
    el.id = 'chat-thinking';
    el.innerHTML =
      `<div class="chat-reply">` +
        `<div class="argus-sender">Argus</div>` +
        `<div class="chat-thinking">` +
          `<span class="p-icon--spinner u-animation--spin" aria-hidden="true"></span>` +
          `Analysing…` +
        `</div>` +
      `</div>`;
    chatBody.appendChild(el);
    scrollEnd(chatBody);
  }

  function hideThinking() {
    const el = document.getElementById('chat-thinking');
    if (el) el.remove();
  }

  function renderReply(reply) {
    const color = CATEGORY_COLOR[reply.category] || CATEGORY_COLOR.unknown;

    let logHtml = '';
    if (reply.log_excerpts && reply.log_excerpts.length > 0) {
      logHtml = `<details class="log-excerpts">
        <summary>Log excerpts (${reply.log_excerpts.length})</summary>
        <pre>${reply.log_excerpts.map(esc).join('\n─────\n')}</pre>
      </details>`;
    }

    const nextHtml = reply.next_action
      ? `<p style="margin:0.75rem 0 0;font-size:0.8125rem;color:#666;">
           <strong>Next:</strong> ${esc(reply.next_action)}
         </p>`
      : '';

    const el = document.createElement('div');
    el.className = 'chat-row chat-row--agent';
    el.innerHTML =
      `<div class="chat-reply">` +
        `<div class="argus-sender">Argus <span style="font-weight:400;color:#999;text-transform:none;letter-spacing:0;">${ts()}</span></div>` +
        `<div class="p-card" style="margin:0;">` +
          `<div style="padding:1rem;">` +
            `<div style="display:flex;align-items:center;margin-bottom:0.75rem;">` +
              `<span class="category-badge" style="background:${color};">${esc(reply.category || 'unknown')}</span>` +
            `</div>` +
            `<p style="margin:0 0 0.5rem;font-weight:600;">${esc(reply.summary)}</p>` +
            (reply.hypothesis
              ? `<p style="margin:0 0 0.75rem;color:#333;font-size:0.875rem;">${esc(reply.hypothesis)}</p>`
              : '') +
            logHtml +
            nextHtml +
          `</div>` +
        `</div>` +
      `</div>`;
    chatBody.appendChild(el);
    scrollEnd(chatBody);
  }

  function renderError(msg) {
    const el = document.createElement('div');
    el.className = 'chat-row chat-row--agent';
    el.innerHTML =
      `<div class="chat-reply">` +
        `<div class="argus-sender">Argus</div>` +
        `<div class="p-notification--negative" style="margin:0;">` +
          `<div class="p-notification__content">` +
            `<p class="p-notification__message">${esc(msg)}</p>` +
          `</div>` +
        `</div>` +
      `</div>`;
    chatBody.appendChild(el);
    scrollEnd(chatBody);
  }

  function setLoading(on) {
    sendBtn.disabled      = on;
    queryInput.disabled   = on;
    sendBtn.textContent   = on ? 'Asking…' : 'Ask';
  }

  async function sendQuery() {
    const q = queryInput.value.trim();
    if (!q || sendBtn.disabled) return;

    appendUserMsg(q);
    queryInput.value = '';
    showThinking();
    setLoading(true);

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({query: q}),
      });
      hideThinking();
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        renderError(data.error || `Server error (HTTP ${res.status})`);
      } else {
        renderReply(await res.json());
      }
    } catch (err) {
      hideThinking();
      renderError(err.message || 'Network error');
    } finally {
      setLoading(false);
      queryInput.focus();
    }
  }

  renderGreeting();

  sendBtn.addEventListener('click', sendQuery);
  queryInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  });
</script>
</body>
</html>
